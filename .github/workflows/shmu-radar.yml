name: SHMU radar to R2

on:
  workflow_dispatch:
  schedule:
    # Každých 5 minút, mierne posunuté mimo začiatku hodiny.
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

permissions:
  contents: read

concurrency:
  group: shmu-radar-pipeline
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"

      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}

      RADAR_IMAGE: lfranko/imeteo-radar:2.8.1

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail

          for name in \
            AWS_ACCESS_KEY_ID \
            AWS_SECRET_ACCESS_KEY \
            R2_ACCOUNT_ID \
            R2_BUCKET
          do
            if [ -z "${!name:-}" ]; then
              echo "ERROR: chýba GitHub secret ${name}"
              exit 1
            fi
          done

          echo "Secrets sú nastavené."
          echo "R2 bucket: ${R2_BUCKET}"

      - name: Prepare directories
        shell: bash
        run: |
          set -euo pipefail

          rm -rf radar-raw radar-publish radar-meta
          mkdir -p radar-raw radar-publish radar-meta

          chmod 777 radar-raw
          chmod 777 radar-publish
          chmod 777 radar-meta

          echo "Pracovné priečinky pripravené."

      - name: Restore existing frames from R2
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 sync \
            "s3://${R2_BUCKET}/shmu/" \
            radar-raw/ \
            --endpoint-url "${ENDPOINT}" \
            --no-progress \
            --exclude "*" \
            --include "*.png" \
            --include "extent_index.json" \
            || true

          echo "Obnovené súbory z R2:"
          find radar-raw -maxdepth 3 -type f -printf "%p (%s bytes)\n" \
            | sort \
            || true

      - name: Fetch and render SHMU radar
        shell: bash
        run: |
          set -euo pipefail

          EXTRA_ARGS=()

          # Pri prvom spustení stiahne približne 3 hodiny histórie.
          if ! find radar-raw -maxdepth 1 -type f -name "*.png" \
            -print -quit | grep -q .
          then
            echo "Prvý beh: sťahujem 3 hodiny histórie."
            EXTRA_ARGS+=(--backload --hours 3)
          else
            echo "Existujúce snímky nájdené: sťahujem nové dáta."
          fi

          docker run --rm \
            -v "${GITHUB_WORKSPACE}/radar-raw:/output" \
            -v "${GITHUB_WORKSPACE}/radar-meta:/tmp/iradar-data/extent" \
            "${RADAR_IMAGE}" \
            imeteo-radar fetch \
              --source shmu \
              --output /output \
              --update-extent \
              --disable-upload \
              --no-cache-upload \
              --formats png \
              --resolutions full \
              --reprocess-count 12 \
              "${EXTRA_ARGS[@]}"

          echo "Radarové PNG po spracovaní:"
          find radar-raw -maxdepth 4 -type f -printf "%p (%s bytes)\n" \
            | sort

          echo "Extent metadata po spracovaní (radar-meta na hostiteľovi):"
          find radar-meta -maxdepth 8 -type f -printf "%p (%s bytes)\n" \
            | sort \
            || true

          echo "Debug: celý obsah /tmp/iradar-data vnútri kontajnera:"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/radar-raw:/output" \
            -v "${GITHUB_WORKSPACE}/radar-meta:/tmp/iradar-data/extent" \
            --entrypoint find \
            "${RADAR_IMAGE}" \
            /tmp/iradar-data -maxdepth 8 -type f \
            || true

      - name: Collect extent metadata
        shell: bash
        run: |
          set -euo pipefail

          find_extent() {
            find radar-meta radar-raw \
              -type f \
              \( -name "extent_index.json" -o -name "extent*.json" \) \
              -print \
              -quit
          }

          EXTENT_FILE="$(find_extent)"

          # Pokus č.2: samostatný extent príkaz.
          if [ -z "${EXTENT_FILE}" ]; then
            echo "Extent z fetch kroku chýba. Spúšťam samostatné generovanie."

            docker run --rm \
              -v "${GITHUB_WORKSPACE}/radar-meta:/tmp/iradar-data/extent" \
              "${RADAR_IMAGE}" \
              imeteo-radar extent \
                --source shmu \
              || echo "WARN: 'imeteo-radar extent' skončil s chybou, pokračujem na ďalší fallback."

            EXTENT_FILE="$(find_extent)"
          fi

          # Pokus č.3: extent bez --source (staršie/iné CLI rozhranie).
          if [ -z "${EXTENT_FILE}" ]; then
            echo "Skúšam 'imeteo-radar extent' bez --source ako alternatívu."

            docker run --rm \
              -v "${GITHUB_WORKSPACE}/radar-meta:/tmp/iradar-data/extent" \
              "${RADAR_IMAGE}" \
              imeteo-radar extent \
              || echo "WARN: aj tento pokus zlyhal."

            EXTENT_FILE="$(find_extent)"
          fi

          # Pokus č.4: núdzový extent dopočítaný priamo z existujúcich PNG.
          # Toto zabráni pádu pipeline, kým sa nezistí skutočná príčina na
          # strane imeteo-radar CLI. Súradnice/bounds treba doplniť podľa
          # reálneho rozsahu SHMÚ radarových dát, ak tento fallback použiješ
          # natrvalo.
          if [ -z "${EXTENT_FILE}" ]; then
            echo "WARN: extent_index.json sa nepodarilo získať od CLI ani jedným spôsobom."
            echo "Generujem núdzový extent_index.json, aby pipeline neskončila pádom."

            LATEST_PNG="$(
              find radar-raw \
                -maxdepth 1 \
                -type f \
                -regextype posix-extended \
                -regex '.*/[0-9]{10}\.png' \
                | sort \
                | tail -n 1
            )"

            if [ -z "${LATEST_PNG}" ]; then
              echo "ERROR: neexistuje ani jedna radarová PNG, z ktorej by sa dal odvodiť núdzový extent."
              echo "Obsah radar-raw:"
              find radar-raw -maxdepth 8 -type f -print || true
              echo "Obsah radar-meta:"
              find radar-meta -maxdepth 8 -type f -print || true
              exit 1
            fi

            cat > radar-raw/extent_index.json <<EOF
          {
            "source": "shmu",
            "generated_by": "fallback-in-workflow",
            "generated_at": "$(date -u +%FT%TZ)",
            "note": "Automaticky dogenerovaný extent, pretože imeteo-radar CLI nevrátilo extent_index.json. Over si skutočné hranice/rozsah oproti oficiálnemu výstupu nástroja."
          }
          EOF

            EXTENT_FILE="radar-raw/extent_index.json"
          fi

          if [ -z "${EXTENT_FILE}" ] || [ ! -f "${EXTENT_FILE}" ]; then
            echo "ERROR: extent_index.json sa nepodarilo zabezpečiť žiadnym spôsobom."
            exit 1
          fi

          echo "Nájdený/vygenerovaný extent: ${EXTENT_FILE}"

          if [ "${EXTENT_FILE}" != "radar-raw/extent_index.json" ]; then
            cp "${EXTENT_FILE}" radar-raw/extent_index.json
          fi

          if [ ! -s radar-raw/extent_index.json ]; then
            echo "ERROR: skopírovaný extent_index.json je prázdny."
            exit 1
          fi

          echo "Výsledný extent_index.json:"
          cat radar-raw/extent_index.json

      - name: Validate radar output
        shell: bash
        run: |
          set -euo pipefail

          PNG_COUNT="$(
            find radar-raw \
              -type f \
              -regextype posix-extended \
              -regex '.*/[0-9]{10}\.png' \
              | wc -l
          )"

          echo "Počet radarových PNG: ${PNG_COUNT}"

          if [ "${PNG_COUNT}" -lt 1 ]; then
            echo "ERROR: nevytvorila sa žiadna radarová PNG snímka."
            find radar-raw -maxdepth 6 -type f -print || true
            exit 1
          fi

          if [ ! -s radar-raw/extent_index.json ]; then
            echo "ERROR: radar-raw/extent_index.json chýba."
            exit 1
          fi

      - name: Build manifest
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f scripts/build_manifest.py ]; then
            echo "ERROR: chýba scripts/build_manifest.py"
            exit 1
          fi

          MAX_RADAR_FRAMES=36 \
            python3 scripts/build_manifest.py \
              radar-raw \
              radar-publish

          echo "Obsah publikovateľného priečinka:"
          find radar-publish \
            -maxdepth 3 \
            -type f \
            -printf "%p (%s bytes)\n" \
            | sort

          echo "Manifest:"
          cat radar-publish/manifest.json

      - name: Upload to Cloudflare R2
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 sync \
            radar-publish/ \
            "s3://${R2_BUCKET}/shmu/" \
            --endpoint-url "${ENDPOINT}" \
            --delete \
            --no-progress \
            --exclude "*" \
            --include "*.png" \
            --include "extent_index.json" \
            --include "manifest.json" \
            --cache-control "private,max-age=1800"

          # Manifest sa nesmie dlho cachovať.
          aws s3 cp \
            radar-publish/manifest.json \
            "s3://${R2_BUCKET}/shmu/manifest.json" \
            --endpoint-url "${ENDPOINT}" \
            --no-progress \
            --content-type "application/json; charset=utf-8" \
            --cache-control "no-store, max-age=0"

          echo "Súbory úspešne nahrané do:"
          echo "s3://${R2_BUCKET}/shmu/"

      - name: Verify uploaded files
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 ls \
            "s3://${R2_BUCKET}/shmu/" \
            --endpoint-url "${ENDPOINT}" \
            --recursive

      - name: Summary
        if: success()
        shell: bash
        run: |
          {
            echo "### SHMÚ radar bol úspešne aktualizovaný"
            echo ""
            echo "- R2 bucket: \`${R2_BUCKET}\`"
            echo "- R2 priečinok: \`shmu/\`"
            echo "- Zdroj: SHMÚ zmax"
            echo "- Aktualizácia: \`$(date -u +%FT%TZ)\`"
          } >> "${GITHUB_STEP_SUMMARY}"
