name: SHMU radar to R2

on:
  workflow_dispatch:
  schedule:
    # Každých 5 minút, posunuté mimo začiatku hodiny.
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

concurrency:
  group: shmu-radar-pipeline
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY R2_ACCOUNT_ID R2_BUCKET; do
            test -n "${!name:-}" || { echo "Missing secret: $name"; exit 1; }
          done

      - name: Restore existing frames from R2
        shell: bash
        run: |
          set -euo pipefail
          rm -rf radar-raw radar-publish
          mkdir -p radar-raw radar-publish
          chmod 777 radar-raw
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 sync "s3://${R2_BUCKET}/shmu/" radar-raw/ \
            --endpoint-url "$ENDPOINT" \
            --no-progress \
            --exclude "*" \
            --include "*.png" \
            --include "extent_index.json"

            - name: Fetch and render SHMU radar
        run: |
          set -euxo pipefail

          mkdir -p output

          docker run --rm \
            -v "${{ github.workspace }}/output:/out" \
            --entrypoint sh \
            lfranko/imeteo-radar:latest \
            -lc '
              imeteo-radar fetch \
                --source shmu \
                --output /out \
                --backload \
                --hours 3 \
                --reprocess-count 36 \
                --update-extent \
                --disable-upload

              echo "Hľadám extent_index.json..."
              find /tmp -name extent_index.json -type f -print

              EXTENT_FILE="$(find /tmp/iradar-data -name extent_index.json -type f | head -n 1)"

              if [ -z "$EXTENT_FILE" ]; then
                echo "CHYBA: extent_index.json sa v kontajneri nenašiel"
                exit 1
              fi

              cp "$EXTENT_FILE" /out/extent_index.json

              echo "Výsledné súbory:"
              ls -lah /out
            '

          test -f output/extent_index.json
          echo "OK: output/extent_index.json existuje"

      - name: Build manifest
        shell: bash
        run: |
          set -euo pipefail
          MAX_RADAR_FRAMES=36 python scripts/build_manifest.py radar-raw radar-publish
          cat radar-publish/manifest.json

      - name: Upload to Cloudflare R2
        shell: bash
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 sync radar-publish/ "s3://${R2_BUCKET}/shmu/" \
            --endpoint-url "$ENDPOINT" \
            --delete \
            --no-progress \
            --exclude "*" \
            --include "*.png" \
            --include "extent_index.json" \
            --include "manifest.json" \
            --cache-control "private,max-age=1800"
          aws s3 cp radar-publish/manifest.json "s3://${R2_BUCKET}/shmu/manifest.json" \
            --endpoint-url "$ENDPOINT" \
            --no-progress \
            --content-type "application/json; charset=utf-8" \
            --cache-control "no-store, max-age=0"
