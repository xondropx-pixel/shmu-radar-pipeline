name: SHMU radar to R2

on:
  workflow_dispatch:
  schedule:
    # Každých 5 minút, posunuté mimo začiatku hodiny.
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

permissions:
  contents: read

concurrency:
  group: shmu-radar-pipeline
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      RADAR_IMAGE: lfranko/imeteo-radar:2.8.1

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail

          for name in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY R2_ACCOUNT_ID R2_BUCKET; do
            if [ -z "${!name:-}" ]; then
              echo "Missing secret: ${name}"
              exit 1
            fi
          done

      - name: Prepare directories
        shell: bash
        run: |
          set -euo pipefail

          rm -rf radar-raw radar-publish
          mkdir -p radar-raw radar-publish
          chmod 777 radar-raw radar-publish

      - name: Restore existing frames from R2
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 sync "s3://${R2_BUCKET}/shmu/" radar-raw/ \
            --endpoint-url "${ENDPOINT}" \
            --no-progress \
            --exclude "*" \
            --include "*.png" \
            --include "extent_index.json"

      - name: Fetch and render SHMU radar
        shell: bash
        run: |
          set -euo pipefail

          EXTRA_ARGS=()

          # Pri prvom behu stiahni približne tri hodiny histórie.
          if ! compgen -G "radar-raw/*.png" >/dev/null; then
            EXTRA_ARGS+=(--backload --hours 3)
          fi

          docker run --rm \
            -v "${GITHUB_WORKSPACE}/radar-raw:/output" \
            "${RADAR_IMAGE}" \
            imeteo-radar fetch \
              --source shmu \
              --output /output \
              --disable-upload \
              --formats png \
              --resolutions full \
              --reprocess-count 12 \
              "${EXTRA_ARGS[@]}"

      - name: Generate radar extent
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm \
            -v "${GITHUB_WORKSPACE}/radar-raw:/output" \
            "${RADAR_IMAGE}" \
            imeteo-radar extent \
              --source shmu \
              --output /output

          echo "Obsah radar-raw po vytvorení extentu:"
          find radar-raw -maxdepth 4 -type f -printf "%p (%s bytes)\n" | sort

          if ! find radar-raw -name extent_index.json -type f -print -quit | grep -q .; then
            echo "ERROR: extent_index.json sa nevytvoril"
            exit 1
          fi

      - name: Build manifest
        shell: bash
        run: |
          set -euo pipefail

          MAX_RADAR_FRAMES=36 \
            python3 scripts/build_manifest.py radar-raw radar-publish

          echo "Vytvorený manifest:"
          cat radar-publish/manifest.json

      - name: Upload to Cloudflare R2
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 sync radar-publish/ "s3://${R2_BUCKET}/shmu/" \
            --endpoint-url "${ENDPOINT}" \
            --delete \
            --no-progress \
            --exclude "*" \
            --include "*.png" \
            --include "extent_index.json" \
            --include "manifest.json" \
            --cache-control "private,max-age=1800"

          # Manifest sa nesmie dlho cachovať, aby appka videla nové snímky.
          aws s3 cp radar-publish/manifest.json \
            "s3://${R2_BUCKET}/shmu/manifest.json" \
            --endpoint-url "${ENDPOINT}" \
            --no-progress \
            --content-type "application/json; charset=utf-8" \
            --cache-control "no-store, max-age=0"

      - name: Summary
        if: success()
        shell: bash
        run: |
          echo "### SHMÚ radar bol úspešne aktualizovaný" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "- R2 bucket: \`${R2_BUCKET}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- R2 prefix: \`shmu/\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Čas: \`$(date -u +%FT%TZ)\`" >> "${GITHUB_STEP_SUMMARY}"
