name: SHMU radar to R2

on:
  workflow_dispatch:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

permissions:
  contents: read

concurrency:
  group: shmu-radar-pipeline
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"

      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}

      RADAR_IMAGE: lfranko/imeteo-radar:2.8.1

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail

          for name in \
            AWS_ACCESS_KEY_ID \
            AWS_SECRET_ACCESS_KEY \
            R2_ACCOUNT_ID \
            R2_BUCKET
          do
            if [ -z "${!name:-}" ]; then
              echo "ERROR: chýba secret ${name}"
              exit 1
            fi
          done

          echo "R2 secrets sú nastavené."
          echo "Bucket: ${R2_BUCKET}"

      - name: Prepare directories
        shell: bash
        run: |
          set -euo pipefail

          rm -rf radar-raw radar-publish
          mkdir -p radar-raw radar-publish

          chmod 777 radar-raw
          chmod 777 radar-publish

      - name: Restore existing frames from R2
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 sync \
            "s3://${R2_BUCKET}/shmu/" \
            radar-raw/ \
            --endpoint-url "${ENDPOINT}" \
            --no-progress \
            --exclude "*" \
            --include "*.png" \
            --include "extent_index.json" \
            || true

          echo "Existujúce súbory:"
          find radar-raw -type f -printf "%p (%s bytes)\n" | sort || true

      - name: Fetch and render SHMU radar
        shell: bash
        run: |
          set -euo pipefail

          EXTRA_ARGS=()

          if ! find radar-raw \
            -type f \
            -name "*.png" \
            -print \
            -quit |
            grep -q .
          then
            echo "Prvý beh: sťahujem tri hodiny histórie."
            EXTRA_ARGS+=(--backload --hours 3)
          else
            echo "Existujúce snímky boli nájdené."
          fi

          docker run --rm \
            -v "${GITHUB_WORKSPACE}/radar-raw:/output" \
            "${RADAR_IMAGE}" \
            imeteo-radar fetch \
              --source shmu \
              --output /output \
              --disable-upload \
              --no-cache-upload \
              --formats png \
              --resolutions full \
              --reprocess-count 12 \
              --timeout 600 \
              "${EXTRA_ARGS[@]}"

          echo "Vytvorené radarové PNG:"
          find radar-raw \
            -type f \
            -name "*.png" \
            -printf "%p (%s bytes)\n" |
            sort

          PNG_COUNT="$(
            find radar-raw \
              -type f \
              -name "*.png" |
            wc -l
          )"

          if [ "${PNG_COUNT}" -lt 1 ]; then
            echo "ERROR: nevytvorila sa žiadna radarová PNG snímka."
            exit 1
          fi

      - name: Create exact SHMU extent file
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm \
            -v "${GITHUB_WORKSPACE}/radar-raw:/output" \
            --entrypoint python \
            "${RADAR_IMAGE}" \
            -c 'import json; from datetime import datetime, timezone; from imeteo_radar.config.sources import get_source_instance; e=get_source_instance("shmu").get_extent(); w=e["wgs84"]; data={"metadata":{"title":"Radar Coverage Extent","source":"shmu","generated":datetime.now(timezone.utc).isoformat().replace("+00:00","Z")},"wgs84":{"west":float(w["west"]),"east":float(w["east"]),"south":float(w["south"]),"north":float(w["north"])}}; open("/output/extent_index.json","w",encoding="utf-8").write(json.dumps(data,indent=2))'

          if [ ! -s radar-raw/extent_index.json ]; then
            echo "ERROR: priame vytvorenie extentu zlyhalo."
            exit 1
          fi

          echo "Extent bol vytvorený priamo v radar-raw:"
          cat radar-raw/extent_index.json

      - name: Build manifest without external script
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import json
          import re
          import shutil

          raw = Path("radar-raw")
          publish = Path("radar-publish")
          max_frames = 36

          extent_path = raw / "extent_index.json"

          if not extent_path.is_file():
              raise SystemExit(
                  "ERROR: radar-raw/extent_index.json chýba"
              )

          extent_data = json.loads(
              extent_path.read_text(encoding="utf-8")
          )

          w = extent_data["wgs84"]

          extent = {
              "west": float(w["west"]),
              "east": float(w["east"]),
              "south": float(w["south"]),
              "north": float(w["north"]),
          }

          if extent["west"] >= extent["east"]:
              raise SystemExit("ERROR: neplatný west/east extent")

          if extent["south"] >= extent["north"]:
              raise SystemExit("ERROR: neplatný south/north extent")

          frames = []

          for path in raw.rglob("*.png"):
              match = re.fullmatch(
                  r"(\d{10})\.png",
                  path.name,
              )

              if match and path.stat().st_size > 100:
                  frames.append(
                      (
                          int(match.group(1)),
                          path,
                      )
                  )

          frames.sort(key=lambda item: item[0])
          frames = frames[-max_frames:]

          if not frames:
              raise SystemExit(
                  "ERROR: nenašla sa žiadna radarová PNG snímka"
              )

          if publish.exists():
              shutil.rmtree(publish)

          publish.mkdir(parents=True)

          manifest_frames = []

          for timestamp, source in frames:
              target = publish / f"{timestamp}.png"
              shutil.copy2(source, target)

              manifest_frames.append(
                  {
                      "time": timestamp,
                      "file": target.name,
                      "bytes": target.stat().st_size,
                  }
              )

          shutil.copy2(
              extent_path,
              publish / "extent_index.json",
          )

          latest = manifest_frames[-1]["time"]

          manifest = {
              "version": 1,
              "source": "SHMU",
              "product": "zmax",
              "generatedAt": (
                  datetime.now(timezone.utc)
                  .isoformat()
                  .replace("+00:00", "Z")
              ),
              "latestTime": latest,
              "latestIso": (
                  datetime.fromtimestamp(
                      latest,
                      timezone.utc,
                  )
                  .isoformat()
                  .replace("+00:00", "Z")
              ),
              "extent": extent,
              "frames": manifest_frames,
              "attribution": (
                  "Radarové dáta: Slovenský "
                  "hydrometeorologický ústav (SHMÚ)"
              ),
          }

          manifest_path = publish / "manifest.json"

          manifest_path.write_text(
              json.dumps(
                  manifest,
                  ensure_ascii=False,
                  indent=2,
              ) + "\n",
              encoding="utf-8",
          )

          print(
              f"Manifest hotový: "
              f"{len(manifest_frames)} snímok"
          )

          print(
              manifest_path.read_text(
                  encoding="utf-8"
              )
          )
          PY

      - name: Validate publish directory
        shell: bash
        run: |
          set -euo pipefail

          test -s radar-publish/manifest.json
          test -s radar-publish/extent_index.json

          PUBLISH_COUNT="$(
            find radar-publish \
              -type f \
              -name "*.png" |
            wc -l
          )"

          if [ "${PUBLISH_COUNT}" -lt 1 ]; then
            echo "ERROR: radar-publish neobsahuje PNG."
            exit 1
          fi

          echo "Publikovateľné súbory:"
          find radar-publish \
            -type f \
            -printf "%p (%s bytes)\n" |
            sort

      - name: Upload to Cloudflare R2
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 sync \
            radar-publish/ \
            "s3://${R2_BUCKET}/shmu/" \
            --endpoint-url "${ENDPOINT}" \
            --delete \
            --no-progress \
            --exclude "*" \
            --include "*.png" \
            --include "extent_index.json" \
            --include "manifest.json" \
            --cache-control "private,max-age=1800"

          aws s3 cp \
            radar-publish/manifest.json \
            "s3://${R2_BUCKET}/shmu/manifest.json" \
            --endpoint-url "${ENDPOINT}" \
            --no-progress \
            --content-type "application/json; charset=utf-8" \
            --cache-control "no-store,max-age=0"

      - name: Verify R2 upload
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 ls \
            "s3://${R2_BUCKET}/shmu/" \
            --endpoint-url "${ENDPOINT}" \
            --recursive

      - name: Summary
        if: success()
        shell: bash
        run: |
          {
            echo "### SHMÚ radar bol úspešne aktualizovaný"
            echo ""
            echo "- Bucket: \`${R2_BUCKET}\`"
            echo "- Prefix: \`shmu/\`"
            echo "- Čas: \`$(date -u +%FT%TZ)\`"
          } >> "${GITHUB_STEP_SUMMARY}"
