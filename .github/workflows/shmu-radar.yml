name: SHMU radar to R2

on:
  workflow_dispatch:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

permissions:
  contents: read

concurrency:
  group: shmu-radar-pipeline
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"

      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}

      RADAR_IMAGE: lfranko/imeteo-radar:2.8.1

    steps:
      - name: Validate secrets and tools
        shell: bash
        run: |
          set -euo pipefail

          for name in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY R2_ACCOUNT_ID R2_BUCKET; do
            if [ -z "${!name:-}" ]; then
              echo "ERROR: chýba GitHub secret ${name}"
              exit 1
            fi
          done

          docker --version
          aws --version
          python3 --version

      - name: Prepare directories
        shell: bash
        run: |
          set -euo pipefail

          rm -rf radar-raw radar-meta radar-publish

          mkdir -p radar-raw
          mkdir -p radar-meta
          mkdir -p radar-publish

          chmod 777 radar-raw
          chmod 777 radar-meta
          chmod 777 radar-publish

      - name: Restore existing radar frames from R2
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 sync \
            "s3://${R2_BUCKET}/shmu/" \
            radar-raw/ \
            --endpoint-url "${ENDPOINT}" \
            --no-progress \
            --exclude "*" \
            --include "*.png" \
            || true

          echo "Obnovené PNG súbory:"

          find radar-raw \
            -type f \
            -name "*.png" \
            -printf "%p (%s bytes)\n" \
            | sort \
            || true

      - name: Fetch and render SHMU radar
        shell: bash
        run: |
          set -euo pipefail

          if find radar-raw \
            -type f \
            -name "*.png" \
            -print \
            -quit \
            | grep -q .
          then
            echo "Existujúce snímky boli nájdené."
            echo "Sťahujem posledných 12 radarových časov."

            docker run --rm \
              -v "${GITHUB_WORKSPACE}/radar-raw:/output" \
              -v "${GITHUB_WORKSPACE}/radar-meta:/tmp/iradar-data/extent" \
              "${RADAR_IMAGE}" \
              imeteo-radar fetch \
                --source shmu \
                --output /output \
                --update-extent \
                --disable-upload \
                --no-cache-upload \
                --formats png \
                --resolutions full \
                --reprocess-count 12

          else
            echo "Prvý beh."
            echo "Sťahujem tri hodiny radarovej histórie."

            docker run --rm \
              -v "${GITHUB_WORKSPACE}/radar-raw:/output" \
              -v "${GITHUB_WORKSPACE}/radar-meta:/tmp/iradar-data/extent" \
              "${RADAR_IMAGE}" \
              imeteo-radar fetch \
                --source shmu \
                --output /output \
                --backload \
                --hours 3 \
                --update-extent \
                --disable-upload \
                --no-cache-upload \
                --formats png \
                --resolutions full
          fi

          echo "Vytvorené radarové PNG:"

          find radar-raw \
            -type f \
            -name "*.png" \
            -printf "%p (%s bytes)\n" \
            | sort

          echo "Extent súbory vytvorené kontajnerom:"

          find radar-meta \
            -type f \
            -printf "%p (%s bytes)\n" \
            | sort \
            || true

      - name: Collect exact SHMU extent
        shell: bash
        run: |
          set -euo pipefail

          EXTENT_SOURCE="radar-meta/shmu/extent_index.json"

          if [ ! -s "${EXTENT_SOURCE}" ]; then
            echo "Extent nevznikol počas fetch."
            echo "Spúšťam samostatné generovanie extentu."

            docker run --rm \
              -v "${GITHUB_WORKSPACE}/radar-meta:/tmp/iradar-data/extent" \
              "${RADAR_IMAGE}" \
              imeteo-radar extent \
                --source shmu
          fi

          if [ ! -s "${EXTENT_SOURCE}" ]; then
            echo "ERROR: chýba súbor ${EXTENT_SOURCE}"
            echo "Obsah priečinka radar-meta:"

            find radar-meta \
              -maxdepth 6 \
              -type f \
              -print \
              || true

            exit 1
          fi

          cp \
            "${EXTENT_SOURCE}" \
            radar-raw/extent_index.json

          echo "Použitý SHMÚ extent:"

          cat radar-raw/extent_index.json

      - name: Validate radar files
        shell: bash
        run: |
          set -euo pipefail

          PNG_COUNT="$(
            find radar-raw \
              -type f \
              -name "*.png" \
              | wc -l
          )"

          echo "Počet radarových PNG: ${PNG_COUNT}"

          if [ "${PNG_COUNT}" -lt 1 ]; then
            echo "ERROR: nevytvorila sa žiadna radarová PNG snímka."
            exit 1
          fi

          if [ ! -s radar-raw/extent_index.json ]; then
            echo "ERROR: chýba radar-raw/extent_index.json"
            exit 1
          fi

      - name: Build radar manifest
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import json
          import re
          import shutil

          raw = Path("radar-raw")
          publish = Path("radar-publish")
          extent_file = raw / "extent_index.json"

          if not extent_file.is_file():
              raise SystemExit(
                  "ERROR: extent_index.json chýba"
              )

          extent_json = json.loads(
              extent_file.read_text(
                  encoding="utf-8"
              )
          )

          bounds = extent_json.get(
              "wgs84",
              {}
          )

          required = (
              "west",
              "east",
              "south",
              "north",
          )

          if not all(
              key in bounds
              for key in required
          ):
              raise SystemExit(
                  "ERROR: extent_index.json "
                  "nemá WGS84 hranice"
              )

          extent = {
              key: float(bounds[key])
              for key in required
          }

          if not (
              extent["west"]
              < extent["east"]
          ):
              raise SystemExit(
                  "ERROR: neplatné west/east hranice"
              )

          if not (
              extent["south"]
              < extent["north"]
          ):
              raise SystemExit(
                  "ERROR: neplatné south/north hranice"
              )

          frames = []

          for path in raw.rglob("*.png"):
              match = re.fullmatch(
                  r"(\d{10})\.png",
                  path.name,
              )

              if (
                  match
                  and path.stat().st_size > 100
              ):
                  frames.append(
                      (
                          int(match.group(1)),
                          path,
                      )
                  )

          frames.sort(
              key=lambda item: item[0]
          )

          frames = frames[-36:]

          if not frames:
              raise SystemExit(
                  "ERROR: nenašla sa žiadna "
                  "radarová PNG snímka"
              )

          if publish.exists():
              shutil.rmtree(publish)

          publish.mkdir(
              parents=True
          )

          manifest_frames = []

          for timestamp, source in frames:
              target = publish / f"{timestamp}.png"

              shutil.copy2(
                  source,
                  target,
              )

              manifest_frames.append(
                  {
                      "time": timestamp,
                      "file": target.name,
                  }
              )

          shutil.copy2(
              extent_file,
              publish / "extent_index.json",
          )

          manifest = {
              "version": 1,
              "source": "SHMU",
              "product": "zmax",
              "generatedAt": (
                  datetime.now(timezone.utc)
                  .isoformat()
                  .replace("+00:00", "Z")
              ),
              "extent": extent,
              "frames": manifest_frames,
              "attribution": (
                  "Radarové dáta: SHMÚ"
              ),
          }

          manifest_path = (
              publish / "manifest.json"
          )

          manifest_path.write_text(
              json.dumps(
                  manifest,
                  ensure_ascii=False,
                  indent=2,
              ) + "\n",
              encoding="utf-8",
          )

          print(
              "Manifest vytvorený: "
              f"{len(manifest_frames)} snímok"
          )

          print(
              manifest_path.read_text(
                  encoding="utf-8"
              )
          )
          PY

      - name: Validate publish directory
        shell: bash
        run: |
          set -euo pipefail

          test -s radar-publish/manifest.json
          test -s radar-publish/extent_index.json

          PUBLISH_COUNT="$(
            find radar-publish \
              -type f \
              -name "*.png" \
              | wc -l
          )"

          echo "Počet publikovaných PNG: ${PUBLISH_COUNT}"

          if [ "${PUBLISH_COUNT}" -lt 1 ]; then
            echo "ERROR: radar-publish neobsahuje PNG."
            exit 1
          fi

          echo "Súbory pripravené na upload:"

          find radar-publish \
            -type f \
            -printf "%p (%s bytes)\n" \
            | sort

      - name: Upload radar to Cloudflare R2
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 sync \
            radar-publish/ \
            "s3://${R2_BUCKET}/shmu/" \
            --endpoint-url "${ENDPOINT}" \
            --delete \
            --no-progress \
            --exclude "*" \
            --include "*.png" \
            --include "extent_index.json" \
            --include "manifest.json" \
            --cache-control "private,max-age=1800"

          aws s3 cp \
            radar-publish/manifest.json \
            "s3://${R2_BUCKET}/shmu/manifest.json" \
            --endpoint-url "${ENDPOINT}" \
            --no-progress \
            --content-type "application/json; charset=utf-8" \
            --cache-control "no-store,max-age=0"

      - name: Verify R2 upload
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          echo "Obsah R2 priečinka shmu:"

          aws s3 ls \
            "s3://${R2_BUCKET}/shmu/" \
            --endpoint-url "${ENDPOINT}" \
            --recursive

      - name: Summary
        if: success()
        shell: bash
        run: |
          {
            echo "### SHMÚ radar bol úspešne aktualizovaný"
            echo ""
            echo "- Bucket: \`${R2_BUCKET}\`"
            echo "- Prefix: \`shmu/\`"
            echo "- Čas: \`$(date -u +%FT%TZ)\`"
          } >> "${GITHUB_STEP_SUMMARY}"
